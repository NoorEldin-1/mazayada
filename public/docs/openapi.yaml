  /api/v1/auth/register:
    post:
      summary: Register
      operationId: register
      description: "Create a CITIZEN account and email a 6-digit verification code. Does NOT log\nthe user in — call verify-otp with the returned user_id to obtain tokens."
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nin:
                  type: string
                  description: ''
                  example: consequatur
                first_name_ar:
                  type: string
                  description: 'يجب ألا يزيد عدد أحرف value عن 100 حرفاً.'
                  example: mqeopfuudtdsufvyvddqa
                last_name_ar:
                  type: string
                  description: 'يجب ألا يزيد عدد أحرف value عن 100 حرفاً.'
                  example: mniihfqcoynlazghdtqtq
                phone:
                  type: string
                  description: ''
                  example: consequatur
                email:
                  type: string
                  description: 'يجب أن يكون value بريداً إلكترونياً صحيحاً. يجب ألا يزيد عدد أحرف value عن 255 حرفاً.'
                  example: carolyne.luettgen@example.org
                birth_date:
                  type: string
                  description: 'يجب أن يكون value تاريخاً صحيحاً. يجب أن يكون value تاريخاً قبل <code>2008-06-17</code>.'
                  example: '2006-03-10'
                password:
                  type: string
                  description: ''
                  example: 'O[2UZ5ij-e/dl4m{o,'
                device_name:
                  type: string
                  description: 'يجب ألا يزيد عدد أحرف value عن 80 حرفاً.'
                  example: dqamniihfqcoynlazghdt
                  nullable: true
              required:
                - nin
                - first_name_ar
                - last_name_ar
                - phone
                - email
                - birth_date
                - password
      security: []
