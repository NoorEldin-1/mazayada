openapi: 3.0.3
info:
  title: 'Mazayada API Documentation'
  description: 'Mazayada mobile API (v1). Token-authenticated JSON API for the Flutter client covering auctions and the citizen dashboard. All responses use a unified envelope ({data, message, meta} on success; {message, errors} on error). Money is returned in dinars; send Accept-Language (ar|fr|en) to localize responses.'
  version: 1.0.0
servers:
  -
    url: 'https://mazayada.findosystem.com'
tags:
  -
    name: Appeals
    description: "\nCitizen appeals/complaints, optionally linked to an auction the user took part\nin."
  -
    name: 'Auction Q&A'
    description: "\nRegistered bidders asking written questions during the inspection window\n(§4 step 4). Answers are published by staff and surfaced via the public Q&A\nread endpoint."
  -
    name: 'Auction registration'
    description: "\nThe §4 step-3 flow: acknowledge the condition book, then start paid\nregistration (deposit + entry fee + condition book) via the payment gateway.\nRequires a verified (KYC-complete) account."
  -
    name: Auctions
    description: "\nPublic, read-only auction browsing. Money is returned in dinars; bidders are\nshown only by their deterministic alias."
  -
    name: Authentication
    description: "\nToken-based authentication for the mobile app. Mirrors the web auth flows\n(OTP email verification, enumeration-safe reset, secret-question recovery) but\nissues a Sanctum access + refresh token pair instead of a session. The shared\nOTP / user-creation logic lives in OtpService + RegisterCitizen so web and API\nstay in lock-step."
  -
    name: Bidding
    description: "\nPlacing bids. Requires a verified (KYC-complete) account and a paid\nregistration on the auction. Rate-limited per user per auction."
  -
    name: Dashboard
    description: "\nThe citizen's home summary and their participation history."
  -
    name: Documents
    description: "\nStreams generated PDFs (condition book / award / receipt) from the private\ndisk. Access is gated by DocumentPolicy@download (public docs to any\nauthenticated user; private docs to the owner / auction winner / entity staff)."
  -
    name: Endpoints
    description: ''
  -
    name: KYC
    description: "\nIdentity verification: upload documents to the private disk, submit the profile\nfor review, and stream back the user's own documents. Mirrors the web KYC flow."
  -
    name: Notifications
    description: "\nThe citizen's in-app notification inbox."
  -
    name: Payments
    description: "\nThe winner's final payment plus the gateway return handling and a status\nendpoint the app polls after the gateway web view closes."
  -
    name: Profile
    description: "\nView and update the authenticated citizen's editable profile fields."
  -
    name: System
    description: "\nLightweight, unauthenticated endpoints to verify the API pipeline (routing,\nenvelope, locale, rate limiting) is wired correctly."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain an <b>access token</b> from <code>POST /api/v1/auth/login</code> or <code>POST /api/v1/auth/verify-otp</code> and send it as <code>Authorization: Bearer &lt;access_token&gt;</code>. Access tokens are short-lived — use the <b>refresh token</b> at <code>POST /api/v1/auth/refresh</code> (send the refresh token as the bearer) to obtain a new pair.'
security:
  -
    default: []
paths:
  /api/v1/appeals:
    get:
      summary: 'List my appeals'
      operationId: listMyAppeals
      description: ''
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'يلزم تسجيل الدخول.'
                properties:
                  message:
                    type: string
                    example: 'يلزم تسجيل الدخول.'
      tags:
        - Appeals
      security: []
    post:
      summary: 'Submit an appeal'
      operationId: submitAnAppeal
      description: ''
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses: {  }
      tags:
        - Appeals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject:
                  type: string
                  description: ''
                  example: 'اعتراض على نتيجة المزاد'
                reason:
                  type: string
                  description: ''
                  example: 'لم يتم احتساب مزايدتي الأخيرة.'
                auction_id:
                  type: string
                  description: 'An auction the user participated in (optional).'
                  example: consequatur
                  nullable: true
              required:
                - subject
                - reason
      security: []
  '/api/v1/auctions/{auction_id}/questions':
    post:
      summary: 'Ask a question'
      operationId: askAQuestion
      description: 'Submit a question for staff to answer. Starts as PENDING and public.'
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses: {  }
      tags:
        - 'Auction Q&A'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  description: 'The question text (max 1000).'
                  example: 'هل المركبة تعمل؟'
              required:
                - question
      security: []
    get:
      summary: 'Public Q&A'
      operationId: publicQA
      description: 'Answered, public inspection questions for an auction (asker not identified).'
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: []
                  message: null
                  meta:
                    pagination:
                      current_page: 1
                      last_page: 1
                      per_page: 20
                      total: 0
                      count: 0
                properties:
                  data:
                    type: array
                    example: []
                  message:
                    type: string
                    example: null
                    nullable: true
                  meta:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          last_page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 20
                          total:
                            type: integer
                            example: 0
                          count:
                            type: integer
                            example: 0
      tags:
        - Auctions
      security: []
    parameters:
      -
        in: path
        name: auction_id
        description: 'The ID of the auction.'
        example: a2050443-68af-41f5-8080-20d4b878c6ca
        required: true
        schema:
          type: string
  '/api/v1/auctions/{auction_id}/acknowledge-book':
    post:
      summary: 'Acknowledge the condition book'
      operationId: acknowledgeTheConditionBook
      description: "Records that the citizen has read the condition book (§10.3) — a\nprerequisite for starting registration."
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses: {  }
      tags:
        - 'Auction registration'
      security: []
    parameters:
      -
        in: path
        name: auction_id
        description: 'The ID of the auction.'
        example: a2050443-68af-41f5-8080-20d4b878c6ca
        required: true
        schema:
          type: string
  '/api/v1/auctions/{auction_id}/register':
    post:
      summary: 'Start registration'
      operationId: startRegistration
      description: "Creates the pending payment(s) and returns the gateway redirect URL. Open\n`redirect_url` in a web view; once the gateway returns, poll\n`GET payments/{ref}/status` (or re-fetch the auction) to confirm."
      parameters:
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses: {  }
      tags:
        - 'Auction registration'
      security: []
    parameters:
      -
        in: path
        name: auction_id
        description: 'The ID of the auction.'
        example: a2050443-68af-41f5-8080-20d4b878c6ca
        required: true
        schema:
          type: string
  /api/v1/auctions:
    get:
      summary: 'List auctions'
      operationId: listAuctions
      description: 'Paginated, filterable list of public auctions.'
      parameters:
        -
          in: query
          name: q
          description: 'Search in the Arabic title.'
          example: سيارة
          required: false
          schema:
            type: string
            description: 'Search in the Arabic title.'
            example: سيارة
        -
          in: query
          name: category
          description: 'Filter by category id.'
          example: consequatur
          required: false
          schema:
            type: string
            description: 'Filter by category id.'
            example: consequatur
        -
          in: query
          name: wilaya
          description: 'Filter by wilaya id.'
          example: 16
          required: false
          schema:
            type: integer
            description: 'Filter by wilaya id.'
            example: 16
        -
          in: query
          name: status
          description: 'One of PUBLISHED, ACTIVE, EXTENDED, CLOSED.'
          example: ACTIVE
          required: false
          schema:
            type: string
            description: 'One of PUBLISHED, ACTIVE, EXTENDED, CLOSED.'
            example: ACTIVE
        -
          in: query
          name: type
          description: 'Auction type: SALE or LEASE.'
          example: SALE
          required: false
          schema:
            type: string
            description: 'Auction type: SALE or LEASE.'
            example: SALE
        -
          in: query
          name: per_page
          description: 'Items per page (1-50, default 12).'
          example: 12
          required: false
          schema:
            type: integer
            description: 'Items per page (1-50, default 12).'
            example: 12
        -
          in: header
          name: Accept-Language
          description: ''
          example: ar
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data: []
                  message: null
                  meta:
                    pagination:
                      current_page: 1
                      last_page: 1
                      per_page: 12
                      total: 0
                      count: 0
                properties:
                  data:
                    type: array
                    example: []
                  message:
                    type: string
                    example: null
                    nullable: true
                  meta:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          current_page:
                            type: integer
                            example: 1
                          last_page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 12
                          total:
                            type: integer
                            example: 0
                          count:
                            type: integer
                            example: 0
      tags:
        - Auctions
      security: []
